<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MazeRunner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #08050f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: monospace;
      color: #aaa;
    }
    #canvas { display: block; image-rendering: pixelated; }
    #status { position: fixed; bottom: 8px; font-size: 12px; opacity: 0.4; }
  </style>
</head>
<body>
  <canvas id="canvas" width="1280" height="720" oncontextmenu="event.preventDefault()"></canvas>
  <div id="status">Loading...</div>

  <script>
    var canvas = document.getElementById('canvas');

    function fitCanvas() {
      var scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
      var w = Math.floor(1280 * scale) + 'px';
      var h = Math.floor(720  * scale) + 'px';
      if (canvas.style.width !== w || canvas.style.height !== h) {
        canvas.style.width  = w;
        canvas.style.height = h;
      }
    }
    fitCanvas();
    window.addEventListener('resize', fitCanvas);

    // Raylib's InitWindow() resets canvas CSS size after onRuntimeInitialized fires.
    // Re-apply fitCanvas whenever that happens.
    new MutationObserver(fitCanvas).observe(canvas, {
      attributes: true, attributeFilter: ['style']
    });

    var Module = {
      canvas: canvas,
      print: function(text) {},
      printErr: function(text) { console.warn('[MazeRunner]', text); },
      onRuntimeInitialized: function() {
        document.getElementById('status').textContent = '';
        fitCanvas();
      }
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
